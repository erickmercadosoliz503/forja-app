<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FORJA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E0F11">
<style>
  :root{
    --bg:#FFFFFF; --bg-card:#F4F6F8; --line:#E3E6EA; --text:#111214; --text-dim:#6B7280;
    --accent:#5ACAE4; --accent-ink:#06222C; --accent-strong:#1F8FAE; --accent-tint: rgba(90,202,228,0.16);
    --side-bg:#0E0F11; --side-text:#F5F6F7; --danger:#E4574D; --good:#2F9E52; --radius:14px; font-size:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; display:flex; justify-content:center; }
  h1,h3{ font-family:'Arial Narrow','Helvetica Neue',sans-serif; font-weight:800; letter-spacing:0.02em; text-transform:uppercase; }
  .wrap{ width:100%; max-width:430px; padding:28px 20px 80px 20px; }
  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:26px; }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand-mark{ width:32px;height:32px;border-radius:8px; background:var(--accent); display:flex;align-items:center;justify-content:center; font-weight:900; color:var(--accent-ink); font-size:15px; }
  .brand-name{ font-size:1rem; font-weight:800; letter-spacing:0.06em; }
  .logout{ font-size:0.8rem; color:var(--text-dim); cursor:pointer; border:1px solid var(--line); padding:8px 14px; border-radius:10px; }
  .logout:hover{ border-color:var(--danger); color:var(--danger); }

  .hero{ background:var(--side-bg); color:#fff; border-radius:var(--radius); padding:22px; margin-bottom:18px; }
  .hero .lbl{ font-size:0.72rem; color:var(--accent); font-weight:800; letter-spacing:0.08em; text-transform:uppercase; }
  .hero h1{ font-size:1.25rem; margin-top:8px; text-transform:none; letter-spacing:normal; }
  .hero p{ font-size:0.82rem; color:#9AA0AA; margin-top:4px; }

  .card{ background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:20px; margin-bottom:14px; }
  .card h3{ font-size:0.72rem; color:var(--text-dim); letter-spacing:0.08em; margin-bottom:10px; }
  .card p{ font-size:0.86rem; color:var(--text); line-height:1.5; }
  .card p.dim{ color:var(--text-dim); font-size:0.82rem; }

  .pill{ display:inline-block; margin-top:10px; font-size:0.72rem; font-weight:800; padding:4px 11px; border-radius:20px; }
  .pill.al_dia{ background:rgba(47,158,82,0.12); color:var(--good); }
  .pill.pendiente{ background:var(--accent-tint); color:var(--accent-strong); }

  .day-strip{ display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; }
  .day-pill{ flex-shrink:0; padding:8px 14px; border-radius:10px; background:#fff; border:1px solid var(--line); font-size:0.78rem; font-weight:700; color:var(--text-dim); cursor:pointer; }
  .day-pill.on{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); }

  .exercise-card{ background:#fff; border:1px solid var(--line); border-radius:11px; margin-bottom:9px; overflow:hidden; }
  .exercise-row{ display:flex; align-items:center; gap:10px; padding:12px 13px; cursor:pointer; }
  .exercise-row .ex-name{ font-weight:700; font-size:0.86rem; }
  .exercise-row .ex-target{ font-size:0.74rem; color:var(--text-dim); margin-top:2px; }
  .exercise-row .caret{ margin-left:auto; color:var(--text-dim); font-size:0.75rem; transition:transform .2s; }
  .exercise-card.open .caret{ transform:rotate(180deg); }
  .log-panel{ display:none; padding:0 13px 14px 13px; border-top:1px solid var(--line); }
  .exercise-card.open .log-panel{ display:block; }
  .record-line{ font-size:0.76rem; color:var(--text-dim); margin:10px 0 8px 0; }
  .record-line b{ color:var(--text); }
  .set-rows{ display:flex; flex-direction:column; gap:7px; margin-bottom:10px; }
  .set-row{ display:flex; align-items:center; gap:7px; }
  .set-row span.lbl{ width:52px; font-size:0.75rem; font-weight:700; color:var(--text-dim); }
  .set-row input{ width:60px; border:1px solid var(--line); border-radius:7px; padding:7px; font-size:0.8rem; text-align:center; }
  .set-row span.unit{ font-size:0.75rem; color:var(--text-dim); }
  .set-row button{ margin-left:auto; border:none; background:var(--bg-card); border-radius:7px; width:26px; height:26px; color:var(--danger); cursor:pointer; }
  .mini-btn{ font-size:0.75rem; font-weight:700; color:var(--accent-strong); cursor:pointer; margin-bottom:10px; display:inline-block; }
  .log-save{ background:var(--accent); color:var(--accent-ink); border:none; padding:9px 16px; border-radius:9px; font-weight:700; font-size:0.8rem; cursor:pointer; width:100%; }

  .history{ margin-top:16px; padding-top:14px; border-top:1px solid var(--line); }
  .history h4{ font-size:0.7rem; color:var(--text-dim); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px; font-weight:800; }
  .history-row{ display:flex; align-items:center; gap:8px; padding:7px 0; font-size:0.82rem; }
  .history-row .h-date{ font-size:0.7rem; color:var(--text-dim); width:56px; flex-shrink:0; }
  .history-row .h-val{ flex:1; font-weight:600; }
  .history-row .h-actions{ display:flex; gap:5px; }
  .history-row .h-actions button{ border:none; background:var(--bg-card); border-radius:6px; width:26px; height:26px; cursor:pointer; font-size:0.75rem; }
  .history-row .h-actions button.del{ color:var(--danger); }
  .history-row .h-actions button.edit{ color:var(--accent-strong); }
  .history-row input{ width:56px; border:1px solid var(--line); border-radius:6px; padding:5px; font-size:0.78rem; text-align:center; }

  .loading{ text-align:center; padding:60px 0; color:var(--text-dim); font-size:0.85rem; }
  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0; background:var(--side-bg); color:#fff; padding:12px 20px; border-radius:10px; font-size:0.85rem; font-weight:600; transition:opacity .25s, transform .25s; pointer-events:none; z-index:50; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div id="loading" class="loading">Cargando tu app…</div>

  <div class="wrap" id="panel" style="display:none;">
    <div class="topbar">
      <div class="brand"><div class="brand-mark">F</div><div class="brand-name">FORJA</div></div>
      <div class="logout" onclick="cerrarSesion()">Cerrar sesión</div>
    </div>

    <div class="hero">
      <div class="lbl" id="hero-lbl">Tu entrenador</div>
      <h1 id="hero-nombre">—</h1>
      <p id="hero-sub"></p>
    </div>

    <div class="card">
      <h3>Tu rutina</h3>
      <div id="rutina-content"></div>
      <div id="day-strip" class="day-strip"></div>
      <div id="exercise-list"></div>
    </div>

    <div class="card">
      <h3>Tu plan</h3>
      <p class="dim" id="plan-content">Aún no tienes un plan asignado.</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { escucharSesion, logout } from "./js/auth.js";
    import { obtenerAlumno, obtenerRutinaActiva, obtenerRecord, registrarSerie, obtenerHistorial, actualizarRegistro, eliminarRegistro } from "./js/alumno.js";

    window.cerrarSesion = () => logout();

    let toastTimer;
    window.showToast = (msg) => {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=> t.classList.remove('show'), 2600);
    };

    let entrenadorIdActual = null;
    let alumnoIdActual = null;
    let diasActuales = [];
    let diaSeleccionado = 0;

    function renderDayStrip(){
      document.getElementById('day-strip').innerHTML = diasActuales.map((d, i) =>
        `<div class="day-pill ${i === diaSeleccionado ? 'on' : ''}" onclick="seleccionarDia(${i})">Día ${i+1}</div>`
      ).join('');
    }

    window.seleccionarDia = (i) => {
      diaSeleccionado = i;
      renderDayStrip();
      renderEjercicios();
    };

    function renderEjercicios(){
      const dia = diasActuales[diaSeleccionado];
      const cont = document.getElementById('exercise-list');
      if (!dia) { cont.innerHTML = ''; return; }
      cont.innerHTML = `<h3 style="margin-bottom:10px;">${dia.label}</h3>` + dia.exercises.map((ex, i) => `
        <div class="exercise-card" id="ex-${i}">
          <div class="exercise-row" onclick="toggleEjercicio(${i})">
            <div>
              <div class="ex-name">${ex.nombre}</div>
              <div class="ex-target">${ex.series} series × ${ex.reps}</div>
            </div>
            <div class="caret">▾</div>
          </div>
          <div class="log-panel" id="log-${i}"></div>
        </div>
      `).join('');
    }

    window.toggleEjercicio = async (i) => {
      const card = document.getElementById('ex-' + i);
      const abrir = !card.classList.contains('open');
      document.querySelectorAll('.exercise-card.open').forEach(c => c.classList.remove('open'));
      if (!abrir) return;
      card.classList.add('open');

      const ex = diasActuales[diaSeleccionado].exercises[i];
      const panel = document.getElementById('log-' + i);
      panel.innerHTML = `<div class="record-line">Cargando…</div>`;

      const [record, historial] = await Promise.all([
        obtenerRecord(entrenadorIdActual, alumnoIdActual, ex.ejercicioId),
        obtenerHistorial(entrenadorIdActual, alumnoIdActual, ex.ejercicioId)
      ]);
      const numSets = ex.series && ex.series > 0 ? ex.series : 1;
      panel.dataset.sets = JSON.stringify(Array.from({ length: numSets }, () => ({ peso: '', reps: '' })));
      panel.dataset.historial = JSON.stringify(historial);
      panel.dataset.editando = '';
      renderLogPanel(i, record);
    };

    function formatFecha(fecha){
      if (!fecha) return '';
      const d = fecha.toDate ? fecha.toDate() : new Date(fecha);
      return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
    }

    function renderLogPanel(i, record){
      const panel = document.getElementById('log-' + i);
      const sets = JSON.parse(panel.dataset.sets || '[{"peso":"","reps":""}]');
      const historial = JSON.parse(panel.dataset.historial || '[]');
      const editandoId = panel.dataset.editando || '';

      panel.innerHTML = `
        <div class="record-line">
          ${record ? `🏆 Tu récord: <b>${record.peso}kg × ${record.reps} reps</b>` : 'Aún no tienes ningún registro de este ejercicio'}
        </div>
        <div class="set-rows" id="setrows-${i}">
          ${sets.map((s, si) => `
            <div class="set-row">
              <span class="lbl">Serie ${si+1}</span>
              <input type="number" step="0.5" placeholder="kg" value="${s.peso}" oninput="actualizarSet(${i}, ${si}, 'peso', this.value)">
              <span class="unit">kg ×</span>
              <input type="number" placeholder="reps" value="${s.reps}" oninput="actualizarSet(${i}, ${si}, 'reps', this.value)">
              <span class="unit">reps</span>
              ${sets.length > 1 ? `<button onclick="quitarSet(${i}, ${si})">✕</button>` : ''}
            </div>
          `).join('')}
        </div>
        <div class="mini-btn" onclick="anadirSet(${i})">+ Añadir serie</div>
        <button class="log-save" onclick="guardarSeries(${i})">Guardar series</button>

        ${historial.length ? `
          <div class="history">
            <h4>Tus últimos registros</h4>
            ${historial.map(h => h.id === editandoId ? `
              <div class="history-row">
                <span class="h-date">${formatFecha(h.fecha)}</span>
                <input type="number" step="0.5" id="edit-peso-${h.id}" value="${h.peso}"> kg ×
                <input type="number" id="edit-reps-${h.id}" value="${h.reps}"> reps
                <div class="h-actions">
                  <button class="edit" onclick="guardarEdicionRegistro(${i}, '${h.id}')">✓</button>
                  <button class="del" onclick="cancelarEdicionRegistro(${i})">✕</button>
                </div>
              </div>
            ` : `
              <div class="history-row">
                <span class="h-date">${formatFecha(h.fecha)}</span>
                <span class="h-val">${h.peso}kg × ${h.reps} reps</span>
                <div class="h-actions">
                  <button class="edit" onclick="editarRegistro(${i}, '${h.id}')">✎</button>
                  <button class="del" onclick="borrarRegistro(${i}, '${h.id}')">✕</button>
                </div>
              </div>
            `).join('')}
          </div>
        ` : ''}
      `;
      panel.dataset.record = record ? JSON.stringify(record) : '';
    }

    window.actualizarSet = (i, si, campo, valor) => {
      const panel = document.getElementById('log-' + i);
      const sets = JSON.parse(panel.dataset.sets);
      sets[si][campo] = valor;
      panel.dataset.sets = JSON.stringify(sets);
    };

    window.anadirSet = (i) => {
      const panel = document.getElementById('log-' + i);
      const sets = JSON.parse(panel.dataset.sets);
      sets.push({ peso: '', reps: '' });
      panel.dataset.sets = JSON.stringify(sets);
      renderLogPanel(i, panel.dataset.record ? JSON.parse(panel.dataset.record) : null);
    };

    window.quitarSet = (i, si) => {
      const panel = document.getElementById('log-' + i);
      const sets = JSON.parse(panel.dataset.sets);
      sets.splice(si, 1);
      panel.dataset.sets = JSON.stringify(sets);
      renderLogPanel(i, panel.dataset.record ? JSON.parse(panel.dataset.record) : null);
    };

    async function refrescarPanel(i){
      const ex = diasActuales[diaSeleccionado].exercises[i];
      const panel = document.getElementById('log-' + i);
      const [record, historial] = await Promise.all([
        obtenerRecord(entrenadorIdActual, alumnoIdActual, ex.ejercicioId),
        obtenerHistorial(entrenadorIdActual, alumnoIdActual, ex.ejercicioId)
      ]);
      panel.dataset.historial = JSON.stringify(historial);
      panel.dataset.editando = '';
      renderLogPanel(i, record);
    }

    window.editarRegistro = (i, registroId) => {
      const panel = document.getElementById('log-' + i);
      panel.dataset.editando = registroId;
      renderLogPanel(i, panel.dataset.record ? JSON.parse(panel.dataset.record) : null);
    };

    window.cancelarEdicionRegistro = (i) => {
      const panel = document.getElementById('log-' + i);
      panel.dataset.editando = '';
      renderLogPanel(i, panel.dataset.record ? JSON.parse(panel.dataset.record) : null);
    };

    window.guardarEdicionRegistro = async (i, registroId) => {
      const peso = parseFloat(document.getElementById('edit-peso-' + registroId).value);
      const reps = parseInt(document.getElementById('edit-reps-' + registroId).value);
      if (!peso || !reps) { showToast('Pon un peso y unas repeticiones válidas.'); return; }
      try {
        await actualizarRegistro(entrenadorIdActual, alumnoIdActual, registroId, { peso, reps });
        showToast('Registro corregido ✅');
        await refrescarPanel(i);
      } catch (err) {
        showToast('No se pudo corregir: ' + err.message);
      }
    };

    window.borrarRegistro = async (i, registroId) => {
      if (!confirm('¿Borrar este registro? No se puede deshacer.')) return;
      try {
        await eliminarRegistro(entrenadorIdActual, alumnoIdActual, registroId);
        showToast('Registro borrado.');
        await refrescarPanel(i);
      } catch (err) {
        showToast('No se pudo borrar: ' + err.message);
      }
    };

    window.guardarSeries = async (i) => {
      const panel = document.getElementById('log-' + i);
      const sets = JSON.parse(panel.dataset.sets).filter(s => s.peso && s.reps);
      if (sets.length === 0) { showToast('Añade al menos una serie con peso y repeticiones.'); return; }

      const ex = diasActuales[diaSeleccionado].exercises[i];
      try {
        for (let si = 0; si < sets.length; si++) {
          await registrarSerie(entrenadorIdActual, alumnoIdActual, {
            ejercicioId: ex.ejercicioId, peso: parseFloat(sets[si].peso), reps: parseInt(sets[si].reps), serie: si + 1
          });
        }
        showToast('Series guardadas ✅');
        const numSets = ex.series && ex.series > 0 ? ex.series : 1;
        panel.dataset.sets = JSON.stringify(Array.from({ length: numSets }, () => ({ peso: '', reps: '' })));
        await refrescarPanel(i);
      } catch (err) {
        showToast('No se pudo guardar: ' + err.message);
      }
    };

    escucharSesion(async (estado) => {
      const loading = document.getElementById('loading');
      const panel = document.getElementById('panel');

      if (!estado.autenticado) { window.location.href = 'index.html'; return; }
      if (estado.perfilIncompleto || estado.perfil.rol !== 'alumno') { window.location.href = 'index.html'; return; }

      const { perfil, marca } = estado;
      entrenadorIdActual = perfil.entrenadorId;
      alumnoIdActual = perfil.alumnoId;
      document.getElementById('hero-nombre').textContent = marca ? marca.nombre : 'Tu entrenador';

      loading.style.display = 'none';
      panel.style.display = 'block';

      try {
        const alumno = await obtenerAlumno(entrenadorIdActual, alumnoIdActual);
        if (!alumno) { document.getElementById('hero-sub').textContent = 'No se encontró tu ficha de alumno.'; return; }
        document.getElementById('hero-sub').textContent = `Hola, ${alumno.nombre.split(' ')[0]}`;

        const rutinaEl = document.getElementById('rutina-content');
        if (alumno.rutinaActivaId) {
          const rutina = await obtenerRutinaActiva(entrenadorIdActual, alumno.rutinaActivaId);
          if (rutina && rutina.dias && rutina.dias.length) {
            rutinaEl.innerHTML = '';
            diasActuales = rutina.dias;
            diaSeleccionado = 0;
            renderDayStrip();
            renderEjercicios();
          } else {
            rutinaEl.innerHTML = `<p class="dim">Tu entrenador está preparando tu rutina.</p>`;
          }
        } else {
          rutinaEl.innerHTML = `<p class="dim">Aún no tienes ninguna rutina asignada. Tu entrenador te la enviará en cuanto la prepare, y te avisaremos aquí.</p>`;
        }

        const planEl = document.getElementById('plan-content');
        const estadoPago = alumno.estadoPago || 'pendiente';
        planEl.innerHTML = alumno.planId
          ? `Plan activo <span class="pill ${estadoPago}">${estadoPago === 'al_dia' ? 'Al día' : 'Pendiente'}</span>`
          : `Tu entrenador aún no te ha asignado un plan de pago. <span class="pill ${estadoPago}">${estadoPago === 'al_dia' ? 'Al día' : 'Pendiente'}</span>`;
      } catch (err) {
        document.getElementById('rutina-content').innerHTML = `<p class="dim">No se pudo cargar tu información: ${err.message}</p>`;
      }
    });
  </script>
</body>
</html>
