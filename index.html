<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FORJA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E0F11">
<style>
  :root{
    --bg:#FFFFFF; --bg-card:#F4F6F8; --line:#E3E6EA; --text:#111214; --text-dim:#6B7280;
    --accent:#5ACAE4; --accent-ink:#06222C; --accent-strong:#1F8FAE; --accent-tint: rgba(90,202,228,0.16);
    --side-bg:#0E0F11; --side-text:#F5F6F7; --danger:#E4574D; --radius:14px; font-size:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:24px; }
  h1{ font-family:'Arial Narrow','Helvetica Neue',sans-serif; font-weight:800; letter-spacing:0.02em; text-transform:uppercase; }
  .card{ width:100%; max-width:380px; }
  .brand{ display:flex; align-items:center; gap:10px; margin-bottom:28px; justify-content:center; }
  .brand-mark{ width:38px;height:38px;border-radius:9px; background:var(--accent); display:flex;align-items:center;justify-content:center; font-weight:900; color:var(--accent-ink); font-size:17px; }
  .brand-name{ font-size:1.2rem; font-weight:800; letter-spacing:0.06em; }
  .tabs{ display:flex; background:var(--bg-card); border-radius:12px; padding:4px; margin-bottom:22px; }
  .tab{ flex:1; text-align:center; padding:9px; border-radius:9px; font-size:0.83rem; font-weight:700; color:var(--text-dim); cursor:pointer; }
  .tab.active{ background:#fff; color:var(--text); box-shadow:0 1px 2px rgba(0,0,0,0.06); }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:0.78rem; font-weight:700; color:var(--text-dim); margin-bottom:6px; }
  .field input{ width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--line); font-size:0.9rem; background:#fff; color:var(--text); }
  .field input:focus{ outline:2px solid var(--accent-strong); outline-offset:1px; border-color:transparent; }
  .btn{ width:100%; background:var(--accent); color:var(--accent-ink); border:none; padding:13px; border-radius:12px; font-weight:700; font-size:0.9rem; cursor:pointer; margin-top:4px; }
  .btn:disabled{ opacity:0.6; cursor:default; }
  .msg{ font-size:0.82rem; margin-top:14px; padding:10px 12px; border-radius:10px; display:none; }
  .msg.error{ display:block; background:rgba(228,87,77,0.1); color:var(--danger); }
  .msg.ok{ display:block; background:rgba(47,158,82,0.1); color:#2F9E52; }
  .form{ display:none; }
  .form.active{ display:block; }
  .status{ display:none; text-align:center; }
  .status.active{ display:block; }
  .status .avatar{ width:56px;height:56px;border-radius:50%; background:var(--side-bg); color:#fff; display:flex;align-items:center;justify-content:center; font-weight:800; margin:0 auto 14px auto; }
  .status p{ color:var(--text-dim); font-size:0.85rem; margin-top:6px; }
  .status .next{ background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-top:20px; font-size:0.8rem; color:var(--text-dim); text-align:left; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><div class="brand-mark">F</div><div class="brand-name">FORJA</div></div>

    <div id="auth-block">
      <div class="tabs">
        <div class="tab active" data-tab="login" onclick="switchTab('login')">Entrar</div>
        <div class="tab" data-tab="registro" onclick="switchTab('registro')">Soy alumno</div>
        <div class="tab" data-tab="registro-entrenador" onclick="switchTab('registro-entrenador')">Soy entrenador</div>
      </div>

      <form class="form active" id="form-login">
        <div class="field"><label>Email</label><input type="email" id="login-email" required></div>
        <div class="field"><label>Contraseña</label><input type="password" id="login-password" required></div>
        <button class="btn" type="submit">Entrar</button>
      </form>

      <form class="form" id="form-registro">
        <div class="field"><label>Nombre y apellido</label><input type="text" id="reg-nombre" required></div>
        <div class="field"><label>Email</label><input type="email" id="reg-email" required></div>
        <div class="field"><label>Contraseña</label><input type="password" id="reg-password" minlength="6" required></div>
        <div class="field"><label>Código de invitación de tu entrenador</label><input type="text" id="reg-codigo" placeholder="Ej. BRABUS2026" required></div>
        <button class="btn" type="submit">Crear cuenta</button>
      </form>

      <form class="form" id="form-registro-entrenador">
        <div class="field"><label>Nombre de tu negocio</label><input type="text" id="ent-nombre" placeholder="Ej. EM Trainer" required></div>
        <div class="field"><label>Email</label><input type="email" id="ent-email" required></div>
        <div class="field"><label>Contraseña</label><input type="password" id="ent-password" minlength="6" required></div>
        <button class="btn" type="submit">Crear cuenta de entrenador</button>
      </form>

      <div class="msg" id="msg"></div>
    </div>

    <div class="status" id="status-block">
      <div class="avatar" id="status-avatar">·</div>
      <h1 id="status-title" style="font-size:1.1rem;"></h1>
      <p id="status-sub"></p>
      <div class="next" id="status-next"></div>
      <button class="btn" style="margin-top:16px; background:transparent; border:1px solid var(--line); color:var(--text);" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
  </div>

  <script type="module">
    import { login, registrarAlumno, registrarEntrenador, escucharSesion, logout } from "./js/auth.js";

    window.switchTab = (name) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      document.getElementById('form-login').classList.toggle('active', name === 'login');
      document.getElementById('form-registro').classList.toggle('active', name === 'registro');
      document.getElementById('form-registro-entrenador').classList.toggle('active', name === 'registro-entrenador');
      hideMsg();
    };

    function showMsg(text, tipo){
      const m = document.getElementById('msg');
      m.textContent = text;
      m.className = 'msg ' + tipo;
    }
    function hideMsg(){
      document.getElementById('msg').className = 'msg';
    }

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMsg();
      try {
        await login(
          document.getElementById('login-email').value,
          document.getElementById('login-password').value
        );
      } catch (err) {
        showMsg(traducirError(err), 'error');
      }
    });

    document.getElementById('form-registro').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMsg();
      try {
        await registrarAlumno({
          nombre: document.getElementById('reg-nombre').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value,
          codigoInvitacion: document.getElementById('reg-codigo').value
        });
        showMsg('Cuenta creada. Entrando…', 'ok');
      } catch (err) {
        showMsg(traducirError(err), 'error');
      }
    });

    document.getElementById('form-registro-entrenador').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMsg();
      try {
        await registrarEntrenador({
          nombre: document.getElementById('ent-nombre').value,
          email: document.getElementById('ent-email').value,
          password: document.getElementById('ent-password').value
        });
      } catch (err) {
        showMsg(traducirError(err), 'error');
      }
    });

    function traducirError(err){
      const code = err.code || '';
      if (code.includes('email-already-in-use')) return 'Ya existe una cuenta con ese email.';
      if (code.includes('invalid-credential') || code.includes('wrong-password')) return 'Email o contraseña incorrectos.';
      if (code.includes('weak-password')) return 'La contraseña debe tener al menos 6 caracteres.';
      return err.message || 'Ha ocurrido un error. Inténtalo de nuevo.';
    }

    window.cerrarSesion = () => logout();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }

    // Reacciona al estado de sesión real de Firebase
    escucharSesion((estado) => {
      const authBlock = document.getElementById('auth-block');
      const statusBlock = document.getElementById('status-block');

      if (!estado.autenticado) {
        authBlock.style.display = 'block';
        statusBlock.classList.remove('active');
        return;
      }

      authBlock.style.display = 'none';
      statusBlock.classList.add('active');

      if (estado.perfilIncompleto) {
        document.getElementById('status-title').textContent = 'Cuenta sin perfil';
        document.getElementById('status-sub').textContent = 'Esta cuenta no tiene un rol asignado todavía.';
        return;
      }

      const { perfil, marca } = estado;
      document.getElementById('status-avatar').textContent = perfil.rol === 'entrenador' ? 'E' : 'A';
      document.getElementById('status-title').textContent = perfil.rol === 'entrenador' ? 'Panel del entrenador' : 'Bienvenido/a';

      if (perfil.rol === 'entrenador' && marca) {
        document.getElementById('status-sub').textContent = marca.nombre;
        document.getElementById('status-next').innerHTML =
          `Este es tu código de invitación, compártelo con tus alumnos para que se registren:<br>
           <div style="margin-top:10px; font-size:1.3rem; font-weight:800; letter-spacing:0.05em; color:var(--accent-strong); text-align:center;">${marca.codigoInvitacion}</div>`;
      } else {
        document.getElementById('status-sub').textContent = marca ? `Cuenta vinculada a ${marca.nombre}` : 'Sesión iniciada';
        document.getElementById('status-next').innerHTML =
          'Cimientos conectados correctamente ✅<br>Siguiente paso: la pantalla de rutina leyendo datos reales de Firestore.';
      }
    });
  </script>
</body>
</html>
